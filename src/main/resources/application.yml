server:
  port: ${PORT:8080}

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/copap}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    baseline-version: 1

  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  servlet:
    multipart:
      enabled: true
      max-file-size: 10MB
      max-request-size: 15MB

app:
  executor:
    pool-size: ${EXECUTOR_POOL_SIZE:3}
  analytics:
    window-ms: ${ANALYTICS_WINDOW_MS:300000}
  auth:
    token-expiry-hours: 1
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173}
  image-base-url: ${IMAGE_BASE_URL:http://localhost:8080}
  upload-dir: ${UPLOAD_DIR:./uploads}

management:
  endpoints:
    web:
      exposure:
        include: health,info
